name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (iOS Simulator)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install tools (XcodeGen, xcbeautify)
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick an available iOS Simulator
        id: sim
        run: |
          # Choose the newest available iPhone simulator so we don't pin a
          # device name that may not exist on a given runner image.
          UDID=$(xcrun simctl list devices available --json \
            | python3 -c "import json,sys
data = json.load(sys.stdin)['devices']
best = ''
for runtime, devices in data.items():
    if 'iOS' not in runtime:
        continue
    for d in devices:
        if d.get('isAvailable') and 'iPhone' in d['name']:
            best = d['udid']
print(best)")
          if [ -z "$UDID" ]; then
            echo 'No available iPhone simulator found' >&2
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -project FaceColour.xcodeproj \
            -scheme FaceColour \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
          if-no-files-found: ignore
          retention-days: 7
