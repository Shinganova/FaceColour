<svg xmlns="http://www.w3.org/2000/svg" width="360" height="740" viewBox="0 0 360 740" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="360" height="740" rx="28" fill="#FFFFFF" stroke="#D9D4CF"/>
  <text x="24" y="48" font-size="22" font-weight="700" fill="#1C1B1F">FaceColour</text>
  <text x="336" y="46" font-size="14" fill="#E87A7F" text-anchor="end">History</text>

  <!-- photo + detection -->
  <rect x="24" y="64" width="312" height="150" rx="14" fill="#ECE6E1"/>
  <circle cx="180" cy="139" r="46" fill="#E7C6A8"/>
  <rect x="140" y="104" width="80" height="74" rx="10" fill="none" stroke="#E87A7F" stroke-width="2"/>
  <text x="24" y="238" font-size="13" fill="#2E7D32">● Face detected</text>

  <!-- skin card -->
  <rect x="24" y="250" width="312" height="86" rx="14" fill="#ECE6E1"/>
  <rect x="38" y="264" width="58" height="58" rx="10" fill="#C8995E"/>
  <text x="110" y="282" font-size="15" font-weight="700" fill="#1C1B1F">Undertone: Warm</text>
  <text x="110" y="302" font-size="13" fill="#5C5C5C">Skin type: Type IV (Tan)</text>
  <text x="110" y="320" font-size="13" fill="#5C5C5C">Confidence: High</text>

  <!-- season card -->
  <rect x="24" y="346" width="312" height="150" rx="14" fill="#ECE6E1"/>
  <text x="38" y="372" font-size="17" font-weight="700" fill="#1C1B1F">Season: Autumn</text>
  <text x="38" y="392" font-size="12" fill="#5C5C5C">Warm, deep, and muted — rich, earthy tones.</text>
  <text x="38" y="416" font-size="12" font-weight="600" fill="#1C1B1F">Your palette</text>
  <g>
    <rect x="38" y="424" width="34" height="34" rx="7" fill="#B7410E"/>
    <rect x="80" y="424" width="34" height="34" rx="7" fill="#808000"/>
    <rect x="122" y="424" width="34" height="34" rx="7" fill="#D4A017"/>
    <rect x="164" y="424" width="34" height="34" rx="7" fill="#E2725B"/>
    <rect x="206" y="424" width="34" height="34" rx="7" fill="#2E5E3A"/>
    <rect x="248" y="424" width="34" height="34" rx="7" fill="#357A8C"/>
    <rect x="290" y="424" width="34" height="34" rx="7" fill="#CC5500"/>
  </g>
  <text x="38" y="480" font-size="11" fill="#9A938C">Colors to avoid: icy pink · fuchsia · pure white</text>

  <!-- shade card -->
  <rect x="24" y="506" width="312" height="110" rx="14" fill="#ECE6E1"/>
  <text x="38" y="532" font-size="15" font-weight="700" fill="#1C1B1F">Closest skin-tone shades</text>
  <g text-anchor="middle" font-size="11" fill="#5C5C5C">
    <rect x="44" y="546" width="44" height="44" rx="9" fill="#d7bd96"/><text x="66" y="606">5 · ΔE 1.8</text>
    <rect x="104" y="546" width="44" height="44" rx="9" fill="#eadaba"/><text x="126" y="606">4 · ΔE 4.2</text>
    <rect x="164" y="546" width="44" height="44" rx="9" fill="#a07e56"/><text x="186" y="606">6 · ΔE 6.9</text>
  </g>

  <rect x="24" y="636" width="150" height="44" rx="11" fill="none" stroke="#E87A7F" stroke-width="1.5"/>
  <text x="99" y="664" font-size="14" font-weight="600" fill="#E87A7F" text-anchor="middle">Save to history</text>
  <rect x="186" y="636" width="150" height="44" rx="11" fill="#E87A7F"/>
  <text x="261" y="664" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Shop your colors</text>

  <text x="180" y="712" font-size="11" fill="#B0AAA4" text-anchor="middle">Mockup — not a live screenshot</text>
</svg>
