name: FaceColour
options:
  bundleIdPrefix: com.faceColour
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Set your Apple developer team id here (or in Xcode signing) before running on device:
    DEVELOPMENT_TEAM: ""

targets:
  FaceColour:
    type: application
    platform: iOS
    sources:
      - path: Sources/FaceColour
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.faceColour.app
        INFOPLIST_FILE: Sources/FaceColour/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1" # iPhone only for MVP
        ENABLE_PREVIEWS: YES

  FaceColourTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/FaceColourTests
    dependencies:
      - target: FaceColour
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.faceColour.app.tests

schemes:
  FaceColour:
    build:
      targets:
        FaceColour: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FaceColourTests
